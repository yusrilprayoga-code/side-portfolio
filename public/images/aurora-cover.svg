<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#12233f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- title -->
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#f8fafc" letter-spacing="6">AURORA</text>
  <text x="62" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="1">SSPE Monitoring &amp; Governance Platform</text>
  <text x="62" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Subsurface Performance &amp; Engineering — Regional 1</text>

  <!-- KPI cards -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="60" y="230" width="160" height="80" rx="10" fill="#0f1b30" stroke="#1e3a5f"/>
    <text x="76" y="260" font-size="12" fill="#94a3b8">DRILLING</text>
    <text x="76" y="292" font-size="26" font-weight="700" fill="#f8fafc">98.2%</text>

    <rect x="240" y="230" width="160" height="80" rx="10" fill="#0f1b30" stroke="#1e3a5f"/>
    <text x="256" y="260" font-size="12" fill="#94a3b8">WORKOVER</text>
    <text x="256" y="292" font-size="26" font-weight="700" fill="#f8fafc">87.5%</text>

    <rect x="420" y="230" width="160" height="80" rx="10" fill="#0f1b30" stroke="#1e3a5f"/>
    <text x="436" y="260" font-size="12" fill="#94a3b8">FID APPROVED</text>
    <text x="436" y="292" font-size="26" font-weight="700" fill="#f8fafc">24</text>

    <rect x="600" y="230" width="140" height="80" rx="10" fill="#0f1b30" stroke="#1e3a5f"/>
    <text x="616" y="260" font-size="12" fill="#94a3b8">ON TRACK</text>
    <text x="616" y="292" font-size="26" font-weight="700" fill="#4ade80">▲</text>
  </g>

  <!-- bar chart -->
  <g>
    <rect x="80"  y="470" width="36" height="70"  rx="4" fill="url(#bar)" opacity="0.9"/>
    <rect x="130" y="440" width="36" height="100" rx="4" fill="url(#bar)" opacity="0.7"/>
    <rect x="180" y="410" width="36" height="130" rx="4" fill="url(#bar)" opacity="0.9"/>
    <rect x="230" y="455" width="36" height="85"  rx="4" fill="url(#bar)" opacity="0.6"/>
    <rect x="280" y="395" width="36" height="145" rx="4" fill="url(#bar)" opacity="0.9"/>
  </g>

  <!-- line chart -->
  <polyline points="380,520 450,470 520,490 590,420 660,440 730,380"
    fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#38bdf8">
    <circle cx="450" cy="470" r="6"/>
    <circle cx="590" cy="420" r="6"/>
    <circle cx="730" cy="380" r="6"/>
  </g>

  <!-- footer tag -->
  <text x="60" y="575" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Next.js 16 · React 19 · TypeScript · PostgreSQL · Prisma 7 · Docker</text>
</svg>
